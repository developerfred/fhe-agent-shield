version: '3.8'

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: fhe-agent-anvil
    command: anvil --host 0.0.0.0 --port 8545 --chain-id 31337
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 5s
      retries: 5

  contracts:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: fhe-agent-contracts
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      - RPC_URL=http://anvil:8545
      - PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    volumes:
      - ..:/app
      - ./deployments:/app/deployments
    working_dir: /app
    command: >
      sh -c "forge script script/ForkIntegration.s.sol:ForkIntegrationTest
      --rpc-url http://anvil:8545
      --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      --broadcast
      && sleep infinity"
    networks:
      - fhe-agent-net

  node-tests:
    image: node:20-alpine
    container_name: fhe-agent-tests
    depends_on:
      contracts:
        condition: service_started
    environment:
      - ANVIL_RPC=http://anvil:8545
    volumes:
      - ./scripts:/app/scripts
      - ./deployments:/app/deployments
    working_dir: /app
    command: apk add --no-cache curl && curl -s http://anvil:8545 > /dev/null && echo "Contracts deployed, running tests..."
    networks:
      - fhe-agent-net

networks:
  fhe-agent-net:
    driver: bridge
