version: '3.8'

services:
  # Local Fhenix/Anvil node for contract deployment
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: fhe-agent-anvil
    command: anvil --host 0.0.0.0 --port 8545 --chain-id 31337
    ports:
      - "8545:8545"
    networks:
      - fhe-agent-net
    volumes:
      - ./contracts:/app/contracts
      - ./deployments:/app/deployments

  # Contract deployment service
  deployer:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.deployer
    container_name: fhe-agent-deployer
    depends_on:
      anvil:
        condition: service_started
    environment:
      - RPC_URL=http://anvil:8545
      - PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
    volumes:
      - ./scripts:/app/scripts
      - ./deployments:/app/deployments
    networks:
      - fhe-agent-net
    command: sleep 5 && forge script script/ForkIntegration.s.sol:ForkIntegrationTest --rpc-url http://anvil:8545 --broadcast

  # OpenClaw Gateway
  openclaw:
    image: node:20-alpine
    container_name: fhe-agent-openclaw
    depends_on:
      - anvil
      - deployer
    environment:
      - NODE_ENV=development
      - OPENCLAW_GATEWAY_PORT=18789
      - FHE_VAULT_ADDRESS=${FHE_VAULT_ADDRESS:-}
      - FHE_MEMORY_ADDRESS=${FHE_MEMORY_ADDRESS:-}
      - FHE_SKILL_REGISTRY_ADDRESS=${FHE_SKILL_REGISTRY_ADDRESS:-}
      - FHE_ACTION_SEALER_ADDRESS=${FHE_ACTION_SEALER_ADDRESS:-}
      - ANVIL_RPC=http://anvil:8545
    volumes:
      - ./config:/app/config
      - ../skills:/app/skills
    ports:
      - "18789:18789"
    networks:
      - fhe-agent-net
    command: |
      sh -c "npm install -g openclaw@latest && tail -f /dev/null"

  # TypeScript test runner
  tests:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile.tests
    container_name: fhe-agent-tests
    depends_on:
      anvil:
        condition: service_started
      deployer:
        condition: service_completed_successfully
    environment:
      - ANVIL_RPC=http://anvil:8545
      - FHE_VAULT_ADDRESS=${FHE_VAULT_ADDRESS:-}
      - FHE_MEMORY_ADDRESS=${FHE_MEMORY_ADDRESS:-}
    volumes:
      - ./scripts:/app/scripts
      - ./deployments:/app/deployments
      - ../test/typescript:/app/test/typescript
    networks:
      - fhe-agent-net
    command: npx vitest run --reporter=verbose

networks:
  fhe-agent-net:
    driver: bridge
