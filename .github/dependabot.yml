version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Only scan our actual source code, not external lib/ dependencies
    allow:
      - dependency-name: "@fhenixprotocol/*"
      - dependency-name: "viem"
      - dependency-name: "vitest"
      - dependency-name: "@openzeppelin/*"
      - dependency-name: "typescript"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/sdk/elizaos-plugin"
    schedule:
      interval: "weekly"

  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    # Ignore lib/ submodules - these are external Foundry dependencies
    ignore:
      - dependency-name: "*"
