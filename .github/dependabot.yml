# Dependabot configuration.
#
# Covers every ecosystem that actually exists in this repo. We intentionally
# skip the `lib/` submodules (external Foundry dependencies) and composer
# (there is no composer.json here).
#
# Default policy: weekly cadence, ignore semver-major bumps everywhere.
# Major upgrades (react 18→19, typescript 5→6, zod 3→4, etc.) require
# manual coordination and a dedicated upgrade PR, so we don't let
# Dependabot open them automatically.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions — keep workflow actions up to date, especially for
  # security fixes in third-party actions.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    # Major version bumps of actions (e.g. actions/checkout@v4 → @v6) can
    # silently change behaviour; hold them for a manual review.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # npm — root (Foundry template tooling + prettier/solhint)
  # Only scan our actual source code; Foundry lib/ submodules handle their own.
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    allow:
      - dependency-name: "@fhenixprotocol/*"
      - dependency-name: "@cofhe/*"
      - dependency-name: "viem"
      - dependency-name: "vitest"
      - dependency-name: "@openzeppelin/*"
      - dependency-name: "typescript"
      - dependency-name: "prettier"
      - dependency-name: "solhint"

  # ---------------------------------------------------------------------------
  # npm — frontend (Vite + React dashboard)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # npm — TypeScript SDK
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/sdk/typescript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # npm — ElizaOS plugin SDK
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/sdk/elizaos-plugin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # npm — Moltbook / Moltworker / Moltworker-KV SDKs
  # ---------------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/sdk/moltbook"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/sdk/moltworker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/sdk/moltworker-kv"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # Cargo — Rust SDK
  # ---------------------------------------------------------------------------
  - package-ecosystem: "cargo"
    directory: "/sdk/rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # pip — Python SDK
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ---------------------------------------------------------------------------
  # gomod — Go SDK
  # ---------------------------------------------------------------------------
  - package-ecosystem: "gomod"
    directory: "/sdk/go"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
