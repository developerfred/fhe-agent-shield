name: "Security"

# Static analysis of Solidity contracts via Slither. Results are uploaded to
# GitHub code scanning so they show up on the Security tab and block PRs on
# any new high-severity finding.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**/*.sol"
      - "script/**/*.sol"
      - "test/**/*.sol"
      - "foundry.toml"
      - "remappings.txt"
      - ".github/workflows/security.yml"
  push:
    branches:
      - "main"
    paths:
      - "src/**/*.sol"
      - "script/**/*.sol"
      - "test/**/*.sol"
      - "foundry.toml"
      - "remappings.txt"
      - ".github/workflows/security.yml"
  # Catch ecosystem-wide detector updates even when no code changes.
  schedule:
    - cron: "17 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  slither:
    name: "Slither static analysis"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v4"
        with:
          submodules: "recursive"

      - name: "Install Foundry"
        uses: "foundry-rs/foundry-toolchain@v1"

      - name: "Install Bun"
        uses: "oven-sh/setup-bun@v2"

      - name: "Install dependencies"
        run: "bun install --frozen-lockfile"

      - name: "Build contracts"
        run: "forge build --force"

      - name: "Run Slither"
        id: slither
        uses: "crytic/slither-action@v0.4.2"
        continue-on-error: true
        with:
          target: "."
          fail-on: "none"
          slither-config: "slither.config.json"
          sarif: "slither.sarif"

      - name: "Upload SARIF to GitHub code scanning"
        if: ${{ always() && steps.slither.outputs.sarif != '' }}
        uses: "github/codeql-action/upload-sarif@v3"
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}

      - name: "Slither summary"
        if: always()
        run: |
          echo "## Slither result" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ steps.slither.outcome }}" == "success" ]]; then
            echo "✅ Slither completed — see the Security tab for any findings." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Slither exited non-zero. Findings uploaded to the Security tab." >> "$GITHUB_STEP_SUMMARY"
          fi
