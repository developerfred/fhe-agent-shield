name: "Gas Benchmarks"

# Compare gas usage of every test against the committed .gas-snapshot.
# Fails the PR if any benchmark regresses beyond the tolerance. The goal is
# to make gas regressions loud and reviewable before they hit main.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**/*.sol"
      - "script/**/*.sol"
      - "test/**/*.sol"
      - "foundry.toml"
      - ".gas-snapshot"
      - ".github/workflows/gas.yml"
  push:
    branches:
      - "main"
    paths:
      - "src/**/*.sol"
      - "script/**/*.sol"
      - "test/**/*.sol"
      - "foundry.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FOUNDRY_PROFILE: "ci"

jobs:
  snapshot-check:
    name: "forge snapshot --check"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out the repo"
        uses: "actions/checkout@v4"
        with:
          submodules: "recursive"

      - name: "Install Foundry"
        uses: "foundry-rs/foundry-toolchain@v1"

      - name: "Install Bun"
        uses: "oven-sh/setup-bun@v2"

      - name: "Install dependencies"
        run: "bun install --frozen-lockfile"

      - name: "Build"
        run: "forge build"

      # --tolerance 1 means up to 1% regression per-test is accepted without
      # failing. Tighten to 0 once the suite is stable.
      - name: "Compare against committed snapshot"
        run: "forge snapshot --check --tolerance 1"

      - name: "Diff snapshot (for the summary)"
        if: always()
        run: |
          forge snapshot --diff > snapshot.diff 2>&1 || true
          if [[ -s snapshot.diff ]]; then
            {
              echo "## Gas snapshot diff"
              echo ""
              echo "\`\`\`"
              head -c 6000 snapshot.diff
              echo ""
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Gas snapshot: no changes ✅" >> "$GITHUB_STEP_SUMMARY"
          fi
